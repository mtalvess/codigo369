<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Código 369</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
color:#fff;
font-family:'Poppins',sans-serif;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:50px 20px;
}

h1{
font-family:'Cinzel',serif;
font-size:48px;
color:#d4af37;
letter-spacing:3px;
margin-bottom:20px;
text-shadow:0 0 15px rgba(212,175,55,0.6);
}

.subtitle{
font-size:20px;
margin-bottom:40px;
opacity:.8;
}

.roleta-container{
margin:40px auto;
position:relative;
width:320px;
height:320px;
}

.roleta{
width:100%;
height:100%;
border-radius:50%;
border:10px solid #d4af37;
background:conic-gradient(
#111 0deg 90deg,
#d4af37 90deg 180deg,
#111 180deg 270deg,
#d4af37 270deg 360deg
);
transition:transform 4s cubic-bezier(.17,.67,.83,.67);
box-shadow:0 0 40px rgba(212,175,55,.4);
}

.ponteiro{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid #d4af37;
}

.btn{
display:inline-block;
margin-top:30px;
padding:18px 45px;
background:linear-gradient(90deg,#b8860b,#ffd700);
color:#000;
font-weight:700;
border:none;
border-radius:50px;
cursor:pointer;
font-size:16px;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,215,0,.7);
}

#resultado{
margin-top:25px;
font-size:22px;
font-weight:600;
color:#ffd700;
}

#oferta{
display:none;
margin-top:40px;
}

.price-old{
text-decoration:line-through;
opacity:.5;
}

.price-new{
font-size:32px;
color:#ffd700;
font-weight:700;
margin:10px 0;
}

.countdown{
margin-top:15px;
color:#ffd700;
font-weight:600;
}

footer{
margin-top:60px;
font-size:14px;
opacity:.5;
}
</style>
</head>

<body>

<div class="container">

<h1>CÓDIGO 369</h1>
<p class="subtitle">
Gire a roleta e desbloqueie sua condição exclusiva.
</p>

<div class="roleta-container">
<div class="ponteiro"></div>
<div class="roleta" id="roleta"></div>
</div>

<button class="btn" onclick="girar()">GIRAR ROLETA</button>

<div id="resultado"></div>

<div id="oferta">
<h2 style="font-family:'Cinzel',serif;color:#d4af37;margin-top:20px;">
🔥 15% OFF LIBERADO
</h2>

<p class="price-old">De R$67,00</p>
<p class="price-new">Por R$56,95</p>

<a href="COLE_AQUI_SEU_LINK_DA_KIWIFY" target="_blank">
<button class="btn">QUERO GARANTIR AGORA</button>
</a>

<div class="countdown" id="timer"></div>
</div>

<footer>
Garantia de 7 dias ou seu dinheiro de volta.
</footer>

</div>

<script>
let girou=false;

function girar(){
if(girou) return;
girou=true;

let roleta=document.getElementById("roleta");
let resultado=document.getElementById("resultado");
let oferta=document.getElementById("oferta");

let angulo=1440 + 45; 
roleta.style.transform="rotate("+angulo+"deg)";

setTimeout(()=>{
resultado.innerHTML="✨ Você desbloqueou 15% OFF exclusivo!";
oferta.style.display="block";
iniciarTimer();
},4000);
}

function iniciarTimer(){
let tempo=600;
let timer=setInterval(function(){
let min=Math.floor(tempo/60);
let sec=tempo%60;
document.getElementById("timer").innerHTML=
"Oferta expira em: "+min+"m "+sec+"s";
tempo--;
if(tempo<0){
clearInterval(timer);
document.getElementById("timer").innerHTML="Oferta encerrada.";
}
},1000);
}
</script>

</body>
</html>
