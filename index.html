<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oferta Especial</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at center, #111 0%, #000 80%);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    text-align:center;
    color:white;
}

.container{
    margin-top:40px;
}

.roleta-container{
    position:relative;
    width:320px;
    height:320px;
    margin:0 auto;
}

.roleta{
    width:100%;
    height:100%;
    border-radius:50%;
    border:8px solid #c9a227;
    background:
    conic-gradient(
        #d4af37 0deg 60deg,
        #000 60deg 120deg,
        #d4af37 120deg 180deg,
        #000 180deg 240deg,
        #d4af37 240deg 300deg,
        #000 300deg 360deg
    );
    box-shadow: 0 0 40px rgba(212,175,55,0.5),
                inset 0 0 40px rgba(0,0,0,0.8);
    transition: transform 4s cubic-bezier(.17,.67,.83,.67);
}

.seta{
    position:absolute;
    top:50%;
    left:-20px;
    transform:translateY(-50%);
    width:0;
    height:0;
    border-top:15px solid transparent;
    border-bottom:15px solid transparent;
    border-right:25px solid #c9a227;
}

button{
    margin-top:30px;
    padding:15px 50px;
    border:none;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    background: linear-gradient(90deg,#d4af37,#f5d271);
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.oferta{
    margin-top:50px;
}

.preco-antigo{
    color:#777;
    font-size:18px;
    text-decoration:line-through;
}

.preco-novo{
    font-size:52px;
    font-weight:bold;
    background: linear-gradient(90deg,#d4af37,#f5d271);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.cta{
    margin-top:25px;
}
</style>
</head>

<body>

<div class="container">

    <div class="roleta-container">
        <div class="seta"></div>
        <div class="roleta" id="wheel"></div>
    </div>

    <button onclick="girar()">DESBLOQUEAR OFERTA</button>

    <div class="oferta">
        <p class="preco-antigo">De: R$ 29,90</p>
        <div class="preco-novo">Por: R$ 15,00</div>

        <div class="cta">
            <button>QUERO ACESSAR AGORA</button>
        </div>
    </div>

</div>

<script>
let girou = false;

function girar(){
    if(girou) return;

    const wheel = document.getElementById("wheel");

    // 10% está no setor dourado da posição 240deg
    const angulo10 = 270;

    const voltas = 360 * 6; // 6 voltas completas
    wheel.style.transform = `rotate(${voltas + angulo10}deg)`;

    girou = true;
}
</script>

</body>
</html>
