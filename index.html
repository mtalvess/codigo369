<script>
let girou = false;

function girar() {
  if (girou) return;
  girou = true;

  const roleta = document.getElementById("roleta");
  const oferta = document.getElementById("oferta");

  /*
  Temos 8 fatias.
  Cada fatia = 360 / 8 = 45 graus.
  A fatia do 15% é a 4ª.
  
  Centro da 4ª fatia:
  (45 * 3) + 22.5 = 157.5 graus
  
  Como o ponteiro está à esquerda (180°),
  precisamos alinhar corretamente.
  */

  const anguloFatia15 = 157.5;
  const anguloPonteiro = 180;

  const ajuste = anguloPonteiro - anguloFatia15;

  const voltas = 1440; // 4 voltas completas para efeito suave
  const anguloFinal = voltas + ajuste;

  roleta.style.transform = "rotate(" + anguloFinal + "deg)";

  setTimeout(() => {
    oferta.style.display = "block";
  }, 4000);
}
</script>
